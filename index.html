<body>
  <div class="container">
    <div class="header-flex">
      <div class="header-text">
        <h1>Video Compression</h1>
        <div class="desc">Compress video to 4 sizes variant</div>
      </div>
      <img src="lynx-logo.svg" alt="Lynx Logo" class="lynx-logo">
    </div>
        
    <form id="compressForm" autocomplete="off">
      <div class="input-group">
        <label for="video">Video File <span style="color:var(--error);">*</span></label>
        <label class="file-label" id="fileLabel" for="video">
          <span class="upload-icon">&#8682;</span>
          <span style="font-size:1.08rem;">Drop File to attach, or <span style="color:#284b96;text-decoration:underline;cursor:pointer;">Browse</span></span>
          <span style="font-size:0.97rem;color:#b0b6c3;margin-top:6px;">Max size 500 MB</span>
        </label>
        <input type="file" id="video" name="video" accept="video/mp4,video/quicktime,video/x-msvideo,video/x-matroska,video/webm,video/mpeg" required>
        <div class="file-info" id="fileInfo">No file selected</div>
        <!-- <div class="note">Accepted: mp4, mov, avi, mkv, webm, mpeg. Max 500MB.</div> -->
      </div>
      <!-- No extra params for /compress/percent -->
      <button type="submit" class="submit-btn" id="submitBtn">Compress Video</button>
      <div class="progress" id="progress" style="display:none;">Uploading...</div>
      <div class="error" id="errorMsg" style="display:none;"></div>
    </form>
    <div class="results" id="results" style="display:none;"></div>
  </div>
  <script>
    // === CONFIG ===
    const API_BASE_URL = 'http://localhost:3020'; // Change this if needed
    const ENDPOINT = '/compress/percent';

    // === DOM Elements ===
    const form = document.getElementById('compressForm');
    const videoInput = document.getElementById('video');
    const fileLabel = document.getElementById('fileLabel');
    const fileInfo = document.getElementById('fileInfo');
    const submitBtn = document.getElementById('submitBtn');
    const progress = document.getElementById('progress');
    const errorMsg = document.getElementById('errorMsg');
    const results = document.getElementById('results');

    // === File Input Handling ===
    // No need to manually trigger click, label[for] handles it natively
    videoInput.addEventListener('change', () => {
      if (videoInput.files.length > 0) {
        const file = videoInput.files[0];
        fileInfo.textContent = `${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
      } else {
        fileInfo.textContent = 'No file selected';
      }
    });

    // === Form Submission ===
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      results.style.display = 'none';
      progress.style.display = 'block';
      progress.innerHTML = '<span class="spinner"></span>Uploading...';
      videoInput.disabled = true;
      fileLabel.classList.add('disabled');
      submitBtn.disabled = true;

      // Validate file
      if (videoInput.files.length === 0) {
        showError('Please select a video file.');
        return;
      }
      const file = videoInput.files[0];
      if (file.size > 500 * 1024 * 1024) {
        showError('File exceeds 500MB limit.');
        return;
      }

      // Build FormData
      const formData = new FormData();
      formData.append('video', file);

      try {
        const response = await fetch(API_BASE_URL + ENDPOINT, {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        if (!response.ok || !data.success) {
          throw new Error(data.message || 'Compression failed.');
        }
        showResults(data.data);
      } catch (err) {
        showError(err.message || 'Request failed.');
      } finally {
        submitBtn.disabled = false;
        progress.style.display = 'none';
        progress.innerHTML = '';
        videoInput.disabled = false;
        fileLabel.classList.remove('disabled');
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      progress.style.display = 'none';
      progress.innerHTML = '';
      videoInput.disabled = false;
      fileLabel.classList.remove('disabled');
      submitBtn.disabled = false;
    }

    function showResults(data) {
      if (!data || !Array.isArray(data.variants)) {
        showError('Malformed response from server.');
        return;
      }
      let html = `<div class="info-alert"><span class="info-icon">!</span><span>If compression is <b>completed</b>, you can download the results below.</span></span></div>`;
      html += '<div style="overflow-x:auto"><table class="media-table">';
      html += '<tr>' +
        '<th>NAME</th>' +
        '<th>RESOLUTION</th>' +
        '<th>BITRATE</th>' +
        '<th>CODEC</th>' +
        '<th>FRAMERATE</th>' +
        '<th>SIZE</th>' +
        '<th>OUTPUT</th>' +
        '<th></th>' +
        '</tr>';
      const now = new Date();
      const dateStr = now.toLocaleDateString('en-GB').replace(/\//g, '-');
      for (const v of data.variants) {
        // Format bitrate (bps to kbps/mbps)
        let bitrateStr = '';
        if (typeof v.bitrate === 'number' && v.bitrate > 0) {
          if (v.bitrate >= 1000000) bitrateStr = (v.bitrate/1000000).toFixed(2) + ' Mbps';
          else if (v.bitrate >= 1000) bitrateStr = (v.bitrate/1000).toFixed(0) + ' kbps';
          else bitrateStr = v.bitrate + ' bps';
        }
        let codecStr = v.codec ? v.codec.toUpperCase() : '';
        let frStr = v.framerate ? (v.framerate % 1 === 0 ? v.framerate : v.framerate.toFixed(2)) + ' fps' : '';
        html += '<tr>';
        // Name
        html += `<td>${v.filename || v.label || v.name || '-'}</td>`;
        // Resolution
        html += `<td>${v.resolution || '-'}</td>`;
        // Bitrate
        html += `<td>${bitrateStr || '-'}</td>`;
        // Codec
        html += `<td>${codecStr || '-'}</td>`;
        // Framerate
        html += `<td>${frStr || '-'}</td>`;
        // Size
        let sizeStr = '-';
        if (typeof v.size === 'number' && v.size >= 0) {
          if (v.size >= 1024 * 1024 * 1024) sizeStr = (v.size / (1024*1024*1024)).toFixed(2) + ' GB';
          else if (v.size >= 1024 * 1024) sizeStr = (v.size / (1024*1024)).toFixed(2) + ' MB';
          else if (v.size >= 1024) sizeStr = (v.size / 1024).toFixed(0) + ' KB';
          else sizeStr = v.size + ' B';
        }
        html += `<td>${sizeStr}</td>`;
        // Output (download link)
        if (v.downloadUrl) {
          html += `<td><a class="download-btn" href="${v.downloadUrl}" target="_blank">Download</a></td>`;
        } else {
          html += '<td>-</td>';
        }
        html += '</tr>';
      }
      html += '</table></div>';
      results.innerHTML = html;
      results.style.display = 'block';
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }
  </script>
</body>
